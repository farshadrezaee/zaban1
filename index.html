<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>جزوه انگلیسی · ۹۲ درس</title>
<style>
/* ═══════════════════════════════════════
   DESIGN TOKENS
═══════════════════════════════════════ */
:root {
  --bg:#0d0f14; --bg2:#13161e; --bg3:#1a1e28; --bg4:#222736;
  --g:#22c55e; --gd:rgba(34,197,94,.12); --gg:rgba(34,197,94,.22);
  --ac:#38bdf8; --re:#f87171; --bm:#f59e0b;
  --t:#e8eaf0; --t2:#9ba3b5; --t3:#5c6478;
  --br:rgba(255,255,255,.07); --br2:rgba(255,255,255,.13);
  --r:16px; --rs:10px; --rp:50px;
  --ff:-apple-system,BlinkMacSystemFont,'Segoe UI',Tahoma,Arial,sans-serif;
  --fe:Georgia,'Times New Roman',serif;
  --fm:'Courier New',monospace;
  /* Layout vars — overridden at breakpoints */
  --sidebar-w: 0px;
  --content-pad: 1rem;
  --card-h: 200px;
  --font-scale: 1;
}

/* ═══════════════════════════════════════
   RESET & BASE
═══════════════════════════════════════ */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{font-size:16px;scroll-behavior:smooth}
body{font-family:var(--ff);background:var(--bg);color:var(--t);min-height:100vh;overflow-x:hidden;touch-action:manipulation}

/* ═══════════════════════════════════════
   MOBILE-FIRST LAYOUT  (< 768px)
   Single column, full width
═══════════════════════════════════════ */
.app {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  width: 100%;
}

/* STICKY TOP BAR */
.hdr {
  position: sticky; top:0; z-index:200;
  padding: .75rem 1rem;
  background: rgba(13,15,20,.95);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--br);
  display: flex; align-items:center; justify-content:space-between; gap:10px;
}
.logo{display:flex;align-items:center;gap:9px;min-width:0}
.logo-ic{width:32px;height:32px;border-radius:9px;background:var(--gd);border:1px solid rgba(34,197,94,.3);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.logo-tx{font-size:14px;font-weight:700;color:var(--t);white-space:nowrap}
.logo-sb{font-size:10px;color:var(--t3);display:block;margin-top:1px;white-space:nowrap}
.hdr-right{display:flex;align-items:center;gap:7px;flex-shrink:0}
.hdr-badge{font-size:10px;padding:3px 9px;border-radius:var(--rp);background:var(--gd);border:1px solid rgba(34,197,94,.25);color:var(--g);font-family:var(--fm);white-space:nowrap}
.bm-count{font-size:10px;padding:3px 9px;border-radius:var(--rp);background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);color:var(--bm);font-family:var(--fm);cursor:pointer;transition:all .2s;white-space:nowrap}
.bm-count:hover{background:rgba(245,158,11,.2)}

/* LESSON SELECTOR — horizontal scroll on mobile */
.lsec {
  padding: .65rem 1rem;
  border-bottom: 1px solid var(--br);
  background: var(--bg);
  flex-shrink:0;
}
.lsec-top{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:.55rem}
.lsec-lbl{font-size:9px;font-weight:700;color:var(--t3);letter-spacing:1.5px;text-transform:uppercase;white-space:nowrap}
.lsec-search{position:relative;flex:1;max-width:150px}
.lsec-search input{width:100%;padding:5px 10px 5px 26px;border-radius:var(--rp);border:1px solid var(--br2);background:var(--bg2);color:var(--t);font-size:11px;font-family:var(--ff);outline:none;direction:rtl;transition:border-color .2s}
.lsec-search input:focus{border-color:rgba(34,197,94,.4)}
.lsec-search input::placeholder{color:var(--t3)}
.lsec-search::before{content:"🔍";position:absolute;left:8px;top:50%;transform:translateY(-50%);font-size:10px;pointer-events:none}
.lpills{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;-webkit-overflow-scrolling:touch}
.lpills::-webkit-scrollbar{display:none}
.lpill{flex-shrink:0;padding:5px 11px;border-radius:var(--rp);border:1px solid var(--br2);background:var(--bg2);font-size:11px;font-weight:600;color:var(--t2);cursor:pointer;transition:all .2s;white-space:nowrap;user-select:none}
.lpill.on{background:var(--gd);border-color:rgba(34,197,94,.5);color:var(--g);box-shadow:0 0 10px var(--gg)}
.lpill:active{opacity:.75}

/* TABS */
.tabs{
  display:flex; background:var(--bg);
  border-bottom:1px solid var(--br);
  flex-shrink:0;
  overflow-x:auto; scrollbar-width:none;
}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:1;min-width:70px;text-align:center;padding:8px 4px 10px;font-size:11px;font-weight:600;color:var(--t3);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;user-select:none}
.tab.on{color:var(--g);border-bottom-color:var(--g)}
.tab.bm-tab.on{color:var(--bm);border-bottom-color:var(--bm)}
.tab:active{opacity:.7}

/* MAIN CONTENT AREA */
.main-body {
  flex:1;
  display:flex;
  flex-direction:column;
  min-height:0;
}

/* PANELS */
.panel{display:none;padding:var(--content-pad);flex:1}
.panel.on{display:block}
.lbl{font-size:12px;font-weight:600;color:var(--ac);margin-bottom:.9rem;display:flex;align-items:center;gap:7px}
.lbl::before{content:'';width:3px;height:13px;border-radius:2px;background:var(--ac);flex-shrink:0}
.sec-head{font-size:9px;font-weight:700;color:var(--t3);letter-spacing:1.2px;text-transform:uppercase;margin:1rem 0 .45rem;padding-bottom:.3rem;border-bottom:1px solid var(--br)}
.sec-head:first-child{margin-top:0}

/* ── FLASHCARD ── */
.fc-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:.7rem}
.fc-ctr{font-size:11px;color:var(--t3);font-family:var(--fm)}
.fc-hint{font-size:10px;color:var(--t3);display:flex;align-items:center;gap:4px}
.pulse{width:5px;height:5px;border-radius:50%;background:var(--t3);animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:.35}50%{opacity:1}}

.card-wrap{
  position:relative; height:var(--card-h);
  margin-bottom:.9rem; cursor:pointer;
}
.card-front,.card-back{
  position:absolute;inset:0;border-radius:var(--r);
  border:1px solid var(--br2);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:1.25rem;text-align:center;overflow:hidden;
  transition:opacity .28s ease,transform .28s ease;
}
.card-front{background:linear-gradient(135deg,var(--bg2),var(--bg3));opacity:1;transform:scale(1);z-index:2}
.card-front::before{content:'';position:absolute;top:-30px;right:-30px;width:100px;height:100px;border-radius:50%;background:var(--gd);filter:blur(20px)}
.card-back{background:linear-gradient(135deg,#0f1e16,#0d1a20);border-color:rgba(34,197,94,.2);opacity:0;transform:scale(.95);z-index:1}
.card-back::before{content:'';position:absolute;bottom:-20px;left:-20px;width:80px;height:80px;border-radius:50%;background:var(--gg);filter:blur(20px)}
.card-wrap.flipped .card-front{opacity:0;transform:scale(.95);z-index:1}
.card-wrap.flipped .card-back{opacity:1;transform:scale(1);z-index:2}

.c-en{font-size:20px;font-weight:600;color:var(--t);line-height:1.3;margin-bottom:7px;position:relative;z-index:1;font-family:var(--fe)}
.c-cat{font-size:10px;color:var(--t3);font-family:var(--fm);position:relative;z-index:1}
.c-tap{margin-top:12px;font-size:10px;color:var(--t3);display:flex;align-items:center;gap:5px;position:relative;z-index:1}
.tap-ic{font-size:12px;animation:bounce 1.5s infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
.c-type{font-size:9px;background:rgba(34,197,94,.15);color:var(--g);padding:3px 8px;border-radius:var(--rp);font-family:var(--fm);position:relative;z-index:1;margin-bottom:5px}
.c-fa{font-size:17px;font-weight:700;color:var(--g);margin-bottom:7px;direction:rtl;line-height:1.4;position:relative;z-index:1}
.c-ex{font-size:11px;color:rgba(34,197,94,.65);direction:rtl;position:relative;z-index:1;line-height:1.5}

.ctrls{display:grid;grid-template-columns:1fr auto auto 1fr;gap:6px;margin-bottom:.8rem}
.cbtn{padding:9px 8px;border-radius:var(--rs);border:1px solid var(--br2);background:var(--bg2);color:var(--t2);font-size:12px;font-weight:600;cursor:pointer;font-family:var(--ff);transition:all .18s;display:flex;align-items:center;justify-content:center;gap:4px;white-space:nowrap}
.cbtn:active{transform:scale(.95)}
.cbtn-tts{background:var(--gd);border-color:rgba(34,197,94,.3);color:var(--g);padding:9px 14px}
.cbtn-bm{background:rgba(245,158,11,.08);border-color:rgba(245,158,11,.25);color:var(--t3);padding:9px 12px}
.cbtn-bm.bm-on{color:var(--bm);border-color:rgba(245,158,11,.5);background:rgba(245,158,11,.18)}

.dots{display:flex;justify-content:center;gap:4px;flex-wrap:wrap;max-width:100%;margin:0 auto .4rem}
.dot{width:6px;height:6px;border-radius:50%;background:var(--bg4);border:1px solid var(--br2);transition:all .2s;cursor:pointer;flex-shrink:0}
.dot.on{background:var(--g);border-color:var(--g);box-shadow:0 0 5px var(--gg)}
.dot.vis{border-color:rgba(34,197,94,.3)}
.dot.bm{background:rgba(245,158,11,.4);border-color:var(--bm)}

/* ── WORD LIST ── */
.wgrid{display:flex;flex-direction:column;gap:5px}
.wcard{display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:var(--rs);border:1px solid var(--br);background:var(--bg2);transition:border-color .2s}
.wcard:hover{border-color:var(--br2)}
.wnum{font-size:10px;color:var(--t3);font-family:var(--fm);min-width:17px;text-align:center;flex-shrink:0}
.winfo{flex:1;min-width:0}
.wen{font-size:13px;font-weight:600;color:var(--t);direction:ltr;text-align:left;line-height:1.2;margin-bottom:2px;font-family:var(--fe)}
.wfa{font-size:12px;color:var(--g);font-weight:600;direction:rtl}
.wex{font-size:10px;color:var(--t3);direction:rtl;margin-top:2px;line-height:1.4}
.wtype{font-size:9px;color:var(--ac);font-family:var(--fm);direction:ltr;text-align:left;margin-top:2px}
.wactions{display:flex;gap:4px;align-items:center;flex-shrink:0}
.wtts{width:29px;height:29px;border-radius:50%;border:1px solid rgba(34,197,94,.25);background:var(--gd);color:var(--g);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;transition:all .18s;flex-shrink:0}
.wtts:active{transform:scale(.85)}
.wtts.sp{background:var(--g);color:#000}
.wbm{width:29px;height:29px;border-radius:50%;border:1px solid rgba(245,158,11,.2);background:rgba(245,158,11,.06);color:var(--t3);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;transition:all .18s;flex-shrink:0}
.wbm:active{transform:scale(.85)}
.wbm.bm-on{color:var(--bm);border-color:rgba(245,158,11,.5);background:rgba(245,158,11,.14)}

/* ── QUIZ ── */
.qprog{display:flex;align-items:center;gap:9px;margin-bottom:.9rem}
.qpbar{flex:1;height:4px;background:var(--bg4);border-radius:2px;overflow:hidden}
.qpfill{height:100%;background:var(--g);border-radius:2px;transition:width .4s ease;box-shadow:0 0 5px var(--gg)}
.qptxt{font-size:11px;color:var(--t3);font-family:var(--fm);min-width:34px;text-align:left;flex-shrink:0}
.qcard{background:var(--bg2);border:1px solid var(--br2);border-radius:var(--r);padding:1.1rem;margin-bottom:.8rem}
.qqlbl{font-size:10px;color:var(--t3);font-family:var(--fm);margin-bottom:8px;letter-spacing:1px}
.qen{font-size:17px;font-weight:600;color:var(--t);direction:ltr;text-align:left;margin-bottom:.9rem;line-height:1.3;font-family:var(--fe)}
.qopts{display:flex;flex-direction:column;gap:6px}
.qopt{padding:10px 13px;border-radius:var(--rs);border:1.5px solid var(--br2);background:var(--bg3);font-size:13px;font-weight:500;cursor:pointer;text-align:right;direction:rtl;color:var(--t);font-family:var(--ff);transition:all .18s;display:flex;align-items:center;gap:9px}
.qopt::after{content:'';width:15px;height:15px;border-radius:50%;border:1.5px solid var(--br2);flex-shrink:0;margin-right:auto}
.qopt:active:not(.dis){background:var(--bg4)}
.qopt.ok{background:rgba(34,197,94,.1);border-color:rgba(34,197,94,.4);color:var(--g)}
.qopt.ok::after{background:var(--g);border-color:var(--g);content:'✓';display:flex;align-items:center;justify-content:center;font-size:10px;color:#000}
.qopt.ng{background:rgba(248,113,113,.1);border-color:rgba(248,113,113,.3);color:var(--re)}
.qopt.ng::after{background:var(--re);border-color:var(--re);content:'✗';display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff}
.qopt.dis{cursor:default;pointer-events:none}
.qnxt{width:100%;padding:11px;border-radius:var(--rs);border:none;background:var(--g);color:#000;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--ff);display:none;margin-top:7px}
.score{background:linear-gradient(135deg,#0f1e16,#0a1520);border:1px solid rgba(34,197,94,.25);border-radius:var(--r);padding:1.75rem 1.25rem;text-align:center;display:none;animation:fadeIn .4s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.sc-em{font-size:40px;margin-bottom:8px}
.sc-ti{font-size:19px;font-weight:700;color:var(--g);margin-bottom:5px}
.sc-nm{font-size:40px;font-family:var(--fm);font-weight:500;color:var(--t);margin-bottom:3px}
.sc-pc{font-size:12px;color:var(--t3);margin-bottom:1.1rem}
.sc-bw{height:5px;background:var(--bg4);border-radius:3px;overflow:hidden;margin-bottom:1.1rem}
.sc-bf{height:100%;border-radius:3px;background:var(--g);box-shadow:0 0 7px var(--gg);transition:width 1s ease .3s}
.sc-sb{font-size:12px;color:var(--t2);margin-bottom:1.1rem;line-height:1.6}
.rbtn{width:100%;padding:11px;border-radius:var(--rs);border:1px solid rgba(34,197,94,.3);background:var(--gd);color:var(--g);font-size:13px;font-weight:700;cursor:pointer;font-family:var(--ff)}

/* ── BOOKMARK PANEL ── */
.bm-panel-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.9rem}
.bm-panel-title{font-size:13px;font-weight:700;color:var(--bm);display:flex;align-items:center;gap:7px}
.bm-panel-title::before{content:'';width:3px;height:13px;border-radius:2px;background:var(--bm);flex-shrink:0}
.bm-empty{text-align:center;padding:3rem 1rem;color:var(--t3)}
.bm-empty-ic{font-size:36px;margin-bottom:.7rem}
.bm-empty-tx{font-size:14px;color:var(--t2);margin-bottom:.4rem}
.bm-empty-sub{font-size:11px;color:var(--t3)}
.bm-lesson-group{margin-bottom:1.4rem}
.bm-lesson-title{font-size:10px;font-weight:700;color:var(--bm);letter-spacing:.8px;text-transform:uppercase;margin-bottom:.55rem;padding:.35rem .65rem;background:rgba(245,158,11,.08);border-right:2px solid var(--bm);border-radius:0 var(--rs) var(--rs) 0}
.bm-controls{display:flex;gap:6px;margin-bottom:.9rem;flex-wrap:wrap}
.bm-ctrl-btn{padding:6px 12px;border-radius:var(--rp);border:1px solid var(--br2);background:var(--bg2);color:var(--t2);font-size:11px;font-weight:600;cursor:pointer;font-family:var(--ff);transition:all .18s;white-space:nowrap}
.bm-ctrl-btn:active{opacity:.75}
.bm-ctrl-btn.active{background:rgba(245,158,11,.14);border-color:rgba(245,158,11,.4);color:var(--bm)}
.bm-filter{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:.9rem}
.bm-filter-pill{padding:4px 10px;border-radius:var(--rp);border:1px solid var(--br2);background:var(--bg2);font-size:10px;font-weight:600;color:var(--t2);cursor:pointer;transition:all .2s;white-space:nowrap}
.bm-filter-pill.on{background:rgba(245,158,11,.14);border-color:rgba(245,158,11,.5);color:var(--bm)}
.bm-fc-wrap{background:var(--bg2);border:1px solid rgba(245,158,11,.2);border-radius:var(--r);padding:1.5rem;text-align:center;margin-bottom:.9rem;min-height:130px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .2s}
.bm-fc-wrap:active{transform:scale(.99)}
.bm-fc-en{font-size:19px;font-weight:600;color:var(--t);font-family:var(--fe);margin-bottom:5px}
.bm-fc-hint{font-size:10px;color:var(--t3);margin-top:9px}
.bm-fc-fa{font-size:16px;font-weight:700;color:var(--bm);margin-top:7px;direction:rtl}
.bm-fc-ex{font-size:10px;color:rgba(245,158,11,.6);direction:rtl;margin-top:4px;line-height:1.5}
.bm-fc-ctrls{display:grid;grid-template-columns:1fr auto auto 1fr;gap:6px;margin-bottom:.7rem}

/* TOAST */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--bg3);border:1px solid var(--br2);border-radius:var(--rp);padding:9px 18px;font-size:12px;font-weight:500;color:var(--t);z-index:999;transition:transform .3s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
.bsafe{height:max(env(safe-area-inset-bottom),16px)}

/* ═══════════════════════════════════════
   TABLET  (≥ 640px)
   Wider content, 2-col words
═══════════════════════════════════════ */
@media (min-width: 640px) {
  :root { --content-pad: 1.25rem; --card-h: 220px; }
  .app { max-width: 680px; margin: 0 auto; }
  .hdr { padding: .9rem 1.5rem; }
  .hdr-badge, .bm-count { font-size: 11px; padding: 4px 11px; }
  .logo-tx { font-size: 15px; }
  .lsec { padding: .75rem 1.5rem; }
  .lpill { font-size: 12px; padding: 6px 13px; }
  .tab { font-size: 12px; padding: 9px 6px 11px; }
  .wgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .wen { font-size: 14px; }
  .c-en { font-size: 22px; }
  .qen { font-size: 19px; }
  .c-fa { font-size: 18px; }
}

/* ═══════════════════════════════════════
   DESKTOP  (≥ 1024px)
   TWO-COLUMN LAYOUT:
   Left: lesson list sidebar
   Right: content
═══════════════════════════════════════ */
@media (min-width: 1024px) {
  :root { --content-pad: 1.5rem; --card-h: 240px; }

  body { background: var(--bg); }

  /* Full width app */
  .app {
    max-width: 100%;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  /* Top header — full width */
  .hdr {
    padding: .9rem 2rem;
    border-bottom: 1px solid var(--br);
  }
  .logo-tx { font-size: 16px; }
  .logo-ic { width: 36px; height: 36px; font-size: 17px; }

  /* Below header: sidebar + content side by side */
  .main-body {
    flex: 1;
    display: flex;
    flex-direction: row;
    min-height: 0;
    overflow: hidden;
  }

  /* SIDEBAR */
  .lsec {
    width: 220px;
    flex-shrink: 0;
    border-bottom: none;
    border-left: 1px solid var(--br);
    border-right: none;
    padding: 1rem;
    display: flex;
    flex-direction: column;
    gap: .6rem;
    overflow: hidden;
    background: var(--bg2);
  }
  .lsec-top {
    flex-direction: column;
    align-items: flex-start;
    gap: .5rem;
    margin-bottom: 0;
  }
  .lsec-search { max-width: 100%; width: 100%; }
  .lsec-search input { font-size: 12px; padding: 7px 10px 7px 28px; }
  .lpills {
    flex-direction: column;
    overflow-y: auto;
    overflow-x: hidden;
    scrollbar-width: thin;
    scrollbar-color: var(--br2) transparent;
    flex: 1;
    gap: 3px;
    padding-bottom: 4px;
  }
  .lpills::-webkit-scrollbar { width: 4px; display: block; }
  .lpills::-webkit-scrollbar-track { background: transparent; }
  .lpills::-webkit-scrollbar-thumb { background: var(--br2); border-radius: 4px; }
  .lpill {
    width: 100%;
    text-align: right;
    border-radius: var(--rs);
    padding: 7px 11px;
    font-size: 12px;
    border-color: transparent;
    background: transparent;
  }
  .lpill:hover { background: var(--bg3); border-color: var(--br); }
  .lpill.on {
    background: var(--gd);
    border-color: rgba(34,197,94,.3);
    box-shadow: none;
  }

  /* CONTENT AREA — takes remaining width */
  .content-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
    overflow: hidden;
  }

  /* Tabs stay at top of content area */
  .tabs {
    border-top: none;
    padding: 0 1.5rem;
    background: var(--bg);
    border-bottom: 1px solid var(--br);
  }
  .tab { font-size: 13px; padding: 10px 6px 12px; min-width: 90px; }

  /* Panels scroll inside content area */
  .panels-wrap {
    flex: 1;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--br2) transparent;
    min-height: 0;
  }
  .panels-wrap::-webkit-scrollbar { width: 5px; }
  .panels-wrap::-webkit-scrollbar-track { background: transparent; }
  .panels-wrap::-webkit-scrollbar-thumb { background: var(--br2); border-radius: 4px; }

  .panel { padding: 1.5rem 2rem; }
  .panel.on { display: block; }

  /* Words 3-col on desktop */
  .wgrid { grid-template-columns: 1fr 1fr 1fr; gap: 7px; }
  .wen { font-size: 14px; }

  /* Bigger card */
  .c-en { font-size: 24px; }
  .c-fa { font-size: 19px; }
  .qen { font-size: 21px; }
  .qopt { font-size: 14px; }

  /* Quiz — limit width */
  #tab-qz .qcard { max-width: 600px; }
  #tab-qz .score { max-width: 400px; margin: 0 auto; }

  /* Bookmark panel — 2 col list */
  #tab-bm .wgrid { grid-template-columns: 1fr 1fr; }
  .bm-fc-wrap { min-height: 160px; }
  .bm-fc-en { font-size: 22px; }
}

/* ═══════════════════════════════════════
   WIDE DESKTOP  (≥ 1280px)
═══════════════════════════════════════ */
@media (min-width: 1280px) {
  .lsec { width: 250px; }
  .panel { padding: 1.75rem 2.5rem; }
  .wgrid { grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .wen { font-size: 15px; }
  .wfa { font-size: 13px; }
}

/* ═══════════════════════════════════════
   SMALL MOBILE  (< 380px)
═══════════════════════════════════════ */
@media (max-width: 380px) {
  :root { --card-h: 185px; --content-pad: .85rem; }
  .hdr { padding: .65rem .85rem; }
  .logo-tx { font-size: 13px; }
  .logo-sb { display: none; }
  .lsec { padding: .55rem .85rem; }
  .tab { font-size: 10px; padding: 7px 2px 9px; min-width: 60px; }
  .c-en { font-size: 17px; }
  .cbtn { font-size: 11px; padding: 8px 6px; }
}
</style>

        <div class="bsafe"></div>
      </div>

        <div class="wgrid" id="wlist"></div>
        <div class="bsafe"></div>
      </div>

          <span class="qptxt" id="qptxt">0/0</span>

          <div class="sc-ti" id="sc-ti">عالی!</div>

        <div class="bsafe"></div>

  </div><!-- /content-area -->
</div><!-- /main-body -->

her have sushi.","fa":"خیلی بیشتر سوشی ترجیح می‌دم.","ex":"ترجیح قوی","type":"ترجیح"},{"en":"I would rather have sushi, too.","fa":"منم سوشی ترجیح می‌دم.","ex":"موافقت","type":"ترجیح"},{"en":"I would definitely go for pizza.","fa":"قطعاً پیتزا می‌گیرم.","ex":"تصمیم قطعی","type":"ترجیح"},{"en":"I do not really mind.","fa":"برام فرقی نمی‌کنه.","ex":"بی‌تفاوتی","type":"بی‌تفاوت"},{"en":"Happy either way.","fa":"هر جوری خوشحالم.","ex":"بی‌تفاوتی","type":"بی‌تفاوت"},{"en":"I am not fussed.","fa":"برام مهم نیست.","ex":"British informal","type":"بی‌تفاوت"},{"en":"Both are okay with me.","fa":"هر دو برام اوکیه.","ex":"بی‌تفاوتی","type":"بی‌تفاوت"}]}]},{"id":6,"title":"درس ۶: موافقت و مخالفت","sections":[{"name":"6.1 موافقت با نظرات","words":[{"en":"Absolutely.","fa":"کاملاً موافقم.","ex":"موافقت قوی","type":"موافقت"},{"en":"Exactly.","fa":"دقیقاً.","ex":"موافقت کامل","type":"موافقت"},{"en":"I could not agree more.","fa":"نمی‌تونم بیشتر از این موافق باشم.","ex":"موافقت قوی","type":"موافقت"},{"en":"You are so right.","fa":"کاملاً درست می‌گی.","ex":"تأیید","type":"موافقت"},{"en":"That is a good point.","fa":"نکته خوبیه.","ex":"تأیید نکته","type":"موافقت"},{"en":"I think so, too.","fa":"منم همینطور فکر می‌کنم.","ex":"موافقت","type":"موافقت"},{"en":"That is true.","fa":"درسته.","ex":"تأیید","type":"موافقت"}]},{"name":"6.2 مخالفت با نظرات","words":[{"en":"I am not sure about that.","fa":"مطمئن نیستم درباره این.","ex":"مخالفت ملایم","type":"مخالفت"},{"en":"I do not think so.","fa":"فکر نمی‌کنم.","ex":"مخالفت مستقیم","type":"مخالفت"},{"en":"I am afraid I disagree.","fa":"متأسفم ولی مخالفم.","ex":"مؤدبانه","type":"مخالفت"},{"en":"I think you are wrong.","fa":"فکر می‌کنم اشتباه می‌کنی.","ex":"مستقیم","type":"مخالفت"},{"en":"That is not necessarily true.","fa":"لزوماً درست نیست.","ex":"بحثی","type":"مخالفت"},{"en":"I see your point, but...","fa":"نکته‌ات رو می‌فهمم، ولی...","ex":"مخالفت مؤدبانه","type":"مخالفت"},{"en":"I beg to differ.","fa":"اجازه بدید مخالفم.","ex":"رسمی","type":"مخ  think there might be a problem.","fa":"ببخشید، فکر کنم یه مشکلی هست.","ex":"خیلی مؤدبانه","type":"شکایت"},{"en":"I am sorry to bother you, but...","fa":"ببخشید که مزاحمم ولی...","ex":"مؤدبانه","type":"شکایت"},{"en":"I am not happy about this.","fa":"از این راضی نیستم.","ex":"واضح","type":"شکایت"},{"en":"This is not acceptable.","fa":"این قابل قبول نیست.","ex":"قوی","type":"شکایت"},{"en":"I would like to make a complaint.","fa":"می‌خوام شکایت بدم.","ex":"رسمی","type":"شکایت"},{"en":"Could you look into this for me?","fa":"می‌تونید این رو بررسی کنید؟","ex":"درخواست","type":"شکایت"}]},{"name":"9.2 عذرخواهی","words":[{"en":"Sorry!","fa":"ببخشید!","ex":"ساده و رایج","type":"عذرخواهی"},{"en":"I am so sorry.","fa":"خیلی ببخشید.","ex":"صمیمانه‌تر","type":"عذرخواهی"},{"en":"I do apologise.","fa":"عذرخواهی می‌کنم.","ex":"رسمی","type":"عذرخواهی"},{"en":"Please accept my apologies.","fa":"لطفاً عذرخواهیم رو بپذیرید.","ex":"رسمی","type":"عذرخواهی"},{"en":"I am terribly sorry.","fa":"واقعاً متأسفم.","ex":"قوی","type":"عذرخواهی"},{"en":"It was my fault.","fa":"تقصیر من بود.","ex":"مسئولیت‌پذیری","type":"عذرخواهی"},{"en":"I should not have done that.","fa":"نباید اون کار رو می‌کردم.","ex":"پشیمانی","type":"عذرخواهی"}]},{"name":"9.3 پاسخ به عذرخواهی","words":[{"en":"That is okay.","fa":"اشکالی نداره.","ex":"قبول ساده","type":"پاسخ"},{"en":"Do not worry about it.","fa":"نگران نباش.","ex":"محبت‌آمیز","type":"پاسخ"},{"en":"No worries.","fa":"مشکلی نیست.","ex":"غیررسمی","type":"پاسخ"},{"en":"It happens.","fa":"این چیزا پیش میاد.","ex":"بخشودن","type":"پاسخ"}]}]},{"id":10,"title":"درس ۱۰: خداحافظی","sections":[{"name":"10.1 خداحافظی غیررسمی","words":[{"en":"Bye!","fa":"خداحافظ!","ex":"رایج‌ترین","type":"خداحافظی"},{"en":"See ya!","fa":"بعداً می‌بینمت!","ex":"خیلی غیررسمی","type":"خداحافظی"},{"en":"Laters!","fa":"بعداً!","ex":"British slang","type":"خداحافظی"},{"en":"I am off!","fa":"دارم می‌رم!","ex":"غیررسمی","type":"خداحافظی"},{"en":"Bye now!","fa":"فعلاً خداحافظ!","ex":"دوستانه","typ ":"شنیدم تبریک گفتن؟","ex":"وقتی خبر موفقیت کسی رو شنیدی","type":"تبریک"},{"en":"Yes, I got the promotion!","fa":"آره، ترفیع گرفتم!","ex":"پاسخ به تبریک","type":"پاسخ"},{"en":"Here is to the newlyweds!","fa":"به سلامتی عروس و داماد!","ex":"toast در مراسم عروسی","type":"جشن"},{"en":"Thanks, everyone!","fa":"ممنون همه!","ex":"پاسخ گرم","type":"پاسخ"},{"en":"Happy anniversary! Here is to another 30 years!","fa":"سالگرد ازدواجتون مبارک! به ۳۰ سال دیگه!","ex":"جشن سالگرد ازدواج","type":"جشن"}]},{"name":"16.2 دستاوردها","words":[{"en":"Congrats on the birth of your baby boy!","fa":"تبریک برای تولد پسرت!","ex":"تبریک ولادت نوزاد","type":"تبریک"},{"en":"Is not he beautiful!","fa":"چقدر قشنگه!","ex":"واکنش به نوزاد","type":"واکنش"},{"en":"Well done!","fa":"آفرین!","ex":"تشویق برای موفقیت","type":"تشویق"},{"en":"Happy graduation!","fa":"فارغ‌التحصیلیت مبارک!","ex":"تبریک فارغ‌التحصیلی","type":"تبریک"},{"en":"We are really proud of you!","fa":"واقعاً به‌ات افتخار می‌کنیم!","ex":"از طرف خانواده","type":"افتخار"},{"en":"Welcome to my new home!","fa":"به خونه جدیدم خوش اومدید!","ex":"وقتی خونه جدید داری","type":"دعوت"},{"en":"Your very own place at last!","fa":"بالاخره خونه خودت!","ex":"تبریک خونه جدید","type":"تبریک"}]},{"name":"16.3 رویدادهای دیگر","words":[{"en":"All the best for your retirement.","fa":"برای بازنشستگیت بهترین‌ها رو آرزو دارم.","ex":"بازنشستگی","type":"آرزو"},{"en":"I will miss you all!","fa":"همه‌تون رو دلم تنگ می‌شه!","ex":"هنگام خداحافظی رسمی","type":"احساس"},{"en":"I am so sorry for your loss.","fa":"خیلی متأسفم برای از دست دادنت.","ex":"تسلیت برای فوت","type":"تسلیت"},{"en":"Let me know if there is anything I can do.","fa":"اگه کاری می‌تونم بکنم بهم بگو.","ex":"پیشنهاد کمک در عزا","type":"حمایت"}]}]},{"id":17,"title":"درس ۱۷: معاشرت و جمع","sections":[{"name":"17.1 در مهمانی","words":[{"en":"Great to see you, how are you doing?","fa":"خوشحالم می‌بینمت، چطوری؟","ex":"احوال‌پرسی در مهمانی","type":"احوال‌پرسی"},{"en":"I am good! How are things with you?","fa" ":"پاسخ"},{"en":"I'm getting a refill. Can I get you anything?","fa":"دارم می‌رم پر کنم. می‌خوای چیزی بیارم؟","ex":"محبت به دوست","type":"پیشنهاد"},{"en":"I'll wait for the drinks if you grab that table.","fa":"من صبر می‌کنم برای نوشیدنی‌ها اگه تو اون میز رو بگیری.","ex":"هماهنگی با دوست","type":"پیشنهاد"}]},{"name":"21.2 عبارات بیشتر","words":[{"en":"An iced coffee to go, please.","fa":"یه قهوه یخ برای بیرون لطفاً.","ex":"to go = take away","type":"سفارش"},{"en":"Could I have a skinny latte?","fa":"می‌تونم یه لاته کم‌چرب داشته باشم؟","ex":"skinny = با شیر کم‌چرب","type":"سفارش"},{"en":"I brought my own cup.","fa":"فنجون خودم رو آوردم.","ex":"برای تخفیف یا محیط زیست","type":"اطلاع"},{"en":"Any milk or sugar?","fa":"شیر یا شکر می‌خوای؟","ex":"گارسون می‌پرسه","type":"سوال"},{"en":"Have you got a loyalty card?","fa":"کارت وفاداری داری؟","ex":"برای تخفیف","type":"سوال"},{"en":"Regular or large?","fa":"معمولی یا بزرگ؟","ex":"سایز نوشیدنی","type":"سوال"},{"en":"Take a seat and I'll bring your drinks over to you.","fa":"بشین، نوشیدنی‌ها رو میارم پیشت.","ex":"سرویس میز","type":"اطلاع"}]}]},{"id":22,"title":"درس ۲۲: غذای بیرون‌بر و تحویل","sections":[{"name":"22.1 سفارش غذای بیرون‌بر","words":[{"en":"Shall we get a takeaway curry tonight?","fa":"امشب کاری بیرون‌بر بگیریم؟","ex":"پیشنهاد","type":"پیشنهاد"},{"en":"Good idea. I'll pick it up on my way home.","fa":"ایده خوبیه. سر راه خونه می‌گیرمش.","ex":"قبول + عمل","type":"قبول"},{"en":"Two burgers to go, please.","fa":"دو تا برگر برای بیرون لطفاً.","ex":"سفارش takeaway","type":"سفارش"},{"en":"Do you want fries with that?","fa":"با اون سیب‌زمینی سرخ‌شده هم می‌خوای؟","ex":"سوال رایج fast food","type":"سوال"},{"en":"I've come to pick up my order.","fa":"اومدم سفارشم رو تحویل بگیرم.","ex":"وقتی سفارش آماده‌ست","type":"اطلاع"},{"en":"Can I take your name, please?","fa":"اسمتون رو می‌گید؟","ex":"تأیید سفارش","type":"سوال"}]},{"name":"22.2 سفارش تحویل","words":[{"en":"We've got no food. Let's get a pizza in!","fa":"غذا نداریم. پیتزا // ── HELPERS ──
function allWords(l){return l.sections.flatMap(s=>s.words)}
function pad(n){return n<10?'0'+n:''+n}
function esc(s){return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;')}
function n2fa(n){return String(n).replace(/[0-9]/g,d=>'۰۱۲۳۴۵۶۷۸۹'[d])}
function showToast(m,col){
  const t=document.getElementById('toast');
  t.textContent=m;
  t.style.borderColor=col?col:'';
  t.style.color=col?col:'';
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200)
}

// ── BOOKMARK STORAGE ──
function getBm(){
  try{return JSON.parse(localStorage.getItem('bm_words')||'[]')}catch{return[]}
}
function saveBm(arr){
  try{localStorage.setItem('bm_words',JSON.stringify(arr))}catch{}
}
function bmKey(w){return w.en+'|||'+w.fa}
function isBookmarked(w){return getBm().some(b=>b.key===bmKey(w))}
function toggleBookmark(w,lessonId,lessonTitle){
  let bm=getBm();
  const k=bmKey(w);
  const idx=bm.findIndex(b=>b.key===k);
  if(idx>=0){
    bm.splice(idx,1);
    saveBm(bm);
    updBmCount();
    return false;
  } else {
    bm.push({key:k,en:w.en,fa:w.fa,ex:w.ex,type:w.type,lessonId,lessonTitle,addedAt:Date.now()});
    saveBm(bm);
    updBmCount();
    return true;
  }
}
function updBmCount(){
  const n=getBm().length;
  document.getElementById('bm-total').textContent=n;
}

// ── STATE ──
let curL=0,curC=0,flipped=false,visited=new Set([0]);
let qst={qs:[],cur:0,score:0,answered:false};
let bmMode='list',bmFilterLesson=null;
let bmFcIdx=0,bmFcFlipped=false;
let bmQst={qs:[],cur:0,score:0,answered:false};
let allPillData=[];

// ── INIT ──
function init(){
  // Build pills data
  allPillData=LESSONS.map((l,i)=>({idx:i,id:l.id,title:l.title}));
  renderPills(allPillData);
  updBmCount();
  selLesson(0);
}

function renderPills(data){
  document.getElementById('pills').innerHTML=
    data.map(d=>`<button class="lpill${d.idx===curL?' on':''}" onclick="selLesson(${d.idx})" id="pill-${d.idx}">درس ${n2fa(d.id)}</button>`).join('');
}

function filterLessons(q){
  if(!q.trim()){renderPills(allPillData);return}
  const lq=q.toLowerCase();
  const filtered=allPillData.filter(d=>
    d.title.includes(q)||String(d.id).includes(q)||n2fa(d.id).includes(q)
  );
  renderPills(filtered);
}

function selLesson(i){
  curL=i;curC=0;flipped=false;visited=new Set([0]);
  // Update pills
  document.querySelectorAll('.lpill').forEach(p=>p.classList.remove('on'));
  const curPill=document.getElementById('pill-'+i);
  if(curPill){curPill.classList.add('on');curPill.scrollIntoView({block:'nearest',inline:'center',behavior:'smooth'})}
  document.getElementById('title-badge').textContent='درس '+n2fa(LESSONS[i].id);
  renderFC();renderWD();
  if(document.getElementById('tab-qz').classList.contains('on'))initQuiz();
}

// ── FLASHCARDS ──
function renderFC(){
  const l=LESSONS[curL];
  const ws=allWords(l);
  document.getElementById('fc-lbl').textContent=l.title;
  updCard(ws);
  renderDots(ws);
}

function updCard(ws){
  if(!ws.length)return;
  const w=ws[curC];
  document.getElementById('fc-ctr').textContent=pad(curC+1)+' / '+pad(ws.length);
  document.getElementById('cf-en').textContent=w.en;
  document.getElementById('cf-cat').textContent=w.type;
  document.getElementById('cb-type').textContent=w.type;
  document.getElementById('cb-fa').textContent=w.fa;
  document.getElementById('cb-ex').textContent=w.ex;
  const wrap=document.getElementById('cardWrap');
  wrap.classList.remove('flipped');
  flipped=false;
  // Bookmark button state
  const bmBtn=document.getElementById('fc-bm-btn');
  bmBtn.textContent=isBookmarked(w)?'★':'☆';
  bmBtn.classList.toggle('bm-on',isBookmarked(w));
}

function renderDots(ws){
  document.getElementById('dots').innerHTML=ws.map((w,i)=>{
    const bmCls=isBookmarked(w)?' bm':'';
    const visCls=visited.has(i)?' vis':'';
    const onCls=i===curC?' on':'';
    return`<div class="dot${onCls}${visCls}${bmCls}" onclick="goDot(${i})"></div>`;
  }).join('');
}

function goDot(i){
  const ws=allWords(LESSONS[curL]);
  curC=i;visited.add(i);updCard(ws);renderDots(ws);
}

function flipCard(){
  document.getElementById('cardWrap').classList.toggle('flipped');
  flipped=!flipped;
}

function prevCard(){
  const ws=allWords(LESSONS[curL]);
  curC=(curC-1+ws.length)%ws.length;
  visited.add(curC);updCard(ws);renderDots(ws);
}

function nextCard(){
  const ws=allWords(LESSONS[curL]);
  curC=(curC+1)%ws.length;
  visited.add(curC);updCard(ws);renderDots(ws);
}

function speakCur(){speak(allWords(LESSONS[curL])[curC].en)}

function toggleBmCur(){
  const w=allWords(LESSONS[curL])[curC];
  const l=LESSONS[curL];
  const added=toggleBookmark(w,l.id,l.title);
  const btn=document.getElementById('fc-bm-btn');
  btn.textContent=added?'★':'☆';
  btn.classList.toggle('bm-on',added);
  showToast(added?'⭐ بوکمارک شد':'❌ حذف شد',added?'#f59e0b':null);
  renderDots(allWords(LESSONS[curL]));
}

// ── WORDS ──
function renderWD(){
  const l=LESSONS[curL];
  document.getElementById('wd-lbl').textContent=l.title;
  let html='',n=0;
  l.sections.forEach(s=>{
    html+=`<div class="sec-head">${s.name}</div>`;
    s.words.forEach(w=>{
      n++;
      const bmmed=isBookmarked(w);
      html+=`<div class="wcard" id="wcard-${esc(w.en.slice(0,20))}">
        <div class="wnum">${n2fa(n)}</div>
        <div class="winfo">
          <div class="wen">${w.en}</div>
          <div class="wfa">${w.fa}</div>
          <div class="wex">${w.ex}</div>
          <div class="wtype">${w.type}</div>
        </div>
        <div class="wactions">
          <div class="wtts" onclick="speak('${esc(w.en)}',this)">🔊</div>
          <div class="wbm${bmmed?' bm-on':''}" onclick="wdToggleBm(this,'${esc(w.en)}','${esc(w.fa)}','${esc(w.ex)}','${esc(w.type)}')">${bmmed?'★':'☆'}</div>
        </div>
      </div>`;
    });
  });
  document.getElementById('wlist').innerHTML=html;
}

function wdToggleBm(btn,en,fa,ex,type){
  const l=LESSONS[curL];
  const w={en,fa,ex,type};
  const added=toggleBookmark(w,l.id,l.title);
  btn.textContent=added?'★':'☆';
  btn.classList.toggle('bm-on',added);
  showToast(added?'⭐ بوکمارک شد':'❌ حذف شد',added?'#f59e0b':null);
  renderDots(allWords(LESSONS[curL]));
}

// ── QUIZ ──
function initQuiz(){
  const words=allWords(LESSONS[curL]);
  const sh=[...words].sort(()=>Math.random()-.5);
  const allFa=words.map(x=>x.fa);
  const qs=sh.map(w=>{
    const others=[...allFa.filter(x=>x!==w.fa)].sort(()=>Math.random()-.5).slice(0,3);
    const opts=[...others,w.fa].sort(()=>Math.random()-.5);
    return{en:w.en,correct:w.fa,opts};
  });
  qst={qs,cur:0,score:0,answered:false};
  document.getElementById('score').style.display='none';
  updQProg();renderQuiz();
}

function renderQuiz(){
  const{qs,cur}=qst;
  if(cur>=qs.length){showScore();return}
  const q=qs[cur];
  document.getElementById('qcon').innerHTML=`
    <div class="qcard">
      <div class="qqlbl">سوال ${n2fa(cur+1)} از ${n2fa(qs.length)}</div>
      <div class="qen">${q.en}</div>
      <div class="qopts">
        ${q.opts.map((o,i)=>`<button class="qopt" onclick="ansQ(${i})">${o}</button>`).join('')}
      </div>
      <button class="qnxt" id="qnxt" onclick="nxtQ()">سوال بعدی ▶</button>
    </div>`;
}

function ansQ(i){
  if(qst.answered)return;qst.answered=true;
  const q=qst.qs[qst.cur];
  document.querySelectorAll('.qopt').forEach((b,j)=>{
    b.classList.add('dis');
    if(q.opts[j]===q.correct)b.classList.add('ok');
    else if(j===i&&q.opts[j]!==q.correct)b.classList.add('ng');
  });
  if(q.opts[i]===q.correct){qst.score++;speak(q.en)}
  document.getElementById('qnxt').style.display='block';
}

function nxtQ(){qst.cur++;qst.answered=false;updQProg();renderQuiz()}

function updQProg(){
  const{qs,cur}=qst,p=qs.length?(cur/qs.length*100):0;
  document.getElementById('qfill').style.width=p+'%';
  document.getElementById('qptxt').textContent=cur+'/'+qs.length;
}

function showScore(){
  const{score,qs}=qst,p=Math.round(score/qs.length*100);
  document.getElementById('score').style.display='block';
  document.getElementById('qcon').innerHTML='';
  document.getElementById('sc-em').textContent=p>=80?'🎉':p>=50?'👍':'💪';
  document.getElementById('sc-ti').textContent=p>=80?'عالی بود!':p>=50?'خوب بود!':'تلاش کن!';
  document.getElementById('sc-nm').textContent=score+'/'+qs.length;
  document.getElementById('sc-pc').textContent=p+'٪ درست';
  document.getElementById('sc-sb').textContent=p>=80?'مسلط هستی 💚':p>=50?'نزدیکی! دوباره امتحان کن.':'فلش‌کارت‌ها رو مرور کن.';
  setTimeout(()=>document.getElementById('sc-bf').style.width=p+'%',120);
  document.getElementById('qfill').style.width='100%';
  document.getElementById('qptxt').textContent=qs.length+'/'+qs.length;
}

function restartQuiz(){document.getElementById('score').style.display='none';initQuiz()}

// ── TABS ──
function switchTab(name,el){
  ['fc','wd','qz','bm'].forEach(t=>document.getElementById('tab-'+t).classList.toggle('on',t===name));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  if(el)el.classList.add('on');
  if(name==='qz')initQuiz();
  if(name==='bm')renderBmPanel();
}

// ── BOOKMARK PANEL ──
function setBmMode(mode){
  bmMode=mode;
  document.getElementById('bm-mode-list').classList.toggle('active',mode==='list');
  document.getElementById('bm-mode-fc').classList.toggle('active',mode==='fc');
  document.getElementById('bm-mode-qz').classList.toggle('active',mode==='qz');
  renderBmPanel();
}

function renderBmPanel(){
  const bm=getBm();
  const cont=document.getElementById('bm-content');
  const filterDiv=document.getElementById('bm-filter-pills');
  const modeCtrl=document.getElementById('bm-mode-controls');
  const clearBtn=document.getElementById('bm-clear-btn');
  
  if(!bm.length){
    filterDiv.style.display='none';
    modeCtrl.style.display='none';
    clearBtn.style.display='none';
    cont.innerHTML=`<div class="bm-empty">
      <div class="bm-empty-ic">⭐</div>
      <div class="bm-empty-tx">هنوز کلمه‌ای بوکمارک نشده</div>
      <div class="bm-empty-sub">روی ☆ کنار هر کلمه یا در فلش‌کارت ضربه بزن</div>
    </div>`;
    return;
  }
  
  clearBtn.style.display='block';
  modeCtrl.style.display='flex';
  
  // Build filter pills by lesson
  const lessons=[...new Set(bm.map(b=>b.lessonId))].sort((a,b)=>a-b);
  filterDiv.style.display='flex';
  filterDiv.innerHTML=
    `<div class="bm-filter-pill${bmFilterLesson===null?' on':''}" onclick="setBmFilter(null)">همه (${n2fa(bm.length)})</div>`+
    lessons.map(lid=>{
      const cnt=bm.filter(b=>b.lessonId===lid).length;
      const title=bm.find(b=>b.lessonId===lid).lessonTitle;
      return`<div class="bm-filter-pill${bmFilterLesson===lid?' on':''}" onclick="setBmFilter(${lid})">درس ${n2fa(lid)} (${n2fa(cnt)})</div>`;
    }).join('');
  
  const filtered=bmFilterLesson!==null?bm.filter(b=>b.lessonId===bmFilterLesson):bm;
  
  if(bmMode==='list') renderBmList(filtered,lessons,bm);
  else if(bmMode==='fc') renderBmFC(filtered);
  else if(bmMode==='qz') renderBmQuiz(filtered);
}

function setBmFilter(lid){
  bmFilterLesson=lid;
  bmFcIdx=0;bmFcFlipped=false;
  renderBmPanel();
}

function renderBmList(filtered,lessons,allBm){
  const cont=document.getElementById('bm-content');
  if(bmFilterLesson!==null){
    // Single lesson list
    let html='<div class="wgrid">';
    filtered.forEach((b,i)=>{
      html+=`<div class="wcard">
        <div class="wnum">${n2fa(i+1)}</div>
        <div class="winfo">
          <div class="wen">${b.en}</div>
          <div class="wfa">${b.fa}</div>
          <div class="wex">${b.ex}</div>
          <div class="wtype">${b.type}</div>
        </div>
        <div class="wactions">
          <div class="wtts" onclick="speak('${esc(b.en)}',this)">🔊</div>
          <div class="wbm bm-on" onclick="removeBmItem('${esc(b.key)}')">★</div>
        </div>
      </div>`;
    });
    html+='</div>';
    cont.innerHTML=html;
  } else {
    // Group by lesson
    const byLesson={};
    allBm.forEach(b=>{
      if(!byLesson[b.lessonId])byLesson[b.lessonId]=[];
      byLesson[b.lessonId].push(b);
    });
    let html='';
    Object.keys(byLesson).sort((a,b)=>a-b).forEach(lid=>{
      const items=byLesson[lid];
      html+=`<div class="bm-lesson-group">
        <div class="bm-lesson-title">${items[0].lessonTitle} · ${n2fa(items.length)} کلمه</div>
        <div class="wgrid">`;
      items.forEach((b,i)=>{
        html+=`<div class="wcard">
          <div class="wnum">${n2fa(i+1)}</div>
          <div class="winfo">
            <div class="wen">${b.en}</div>
            <div class="wfa">${b.fa}</div>
            <div class="wex">${b.ex}</div>
            <div class="wtype">${b.type}</div>
          </div>
          <div class="wactions">
            <div class="wtts" onclick="speak('${esc(b.en)}',this)">🔊</div>
            <div class="wbm bm-on" onclick="removeBmItem('${esc(b.key)}')">★</div>
          </div>
        </div>`;
      });
      html+='</div></div>';
    });
    cont.innerHTML=html;
  }
}

    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.8rem">

function flipBmFC(){
  const bm=getBm();
  const filtered=bmFilterLesson!==null?bm.filter(b=>b.lessonId===bmFilterLesson):bm;

  const w=filtered[bmFcIdx];

      <div class="bm-fc-ex">${w.ex}</div>`;

    document.getElementById('bm-fc-card').style.background='rgba(245,158,11,.05)';
  } else {
    inner.innerHTML=`
      <div class="bm-fc-en">${w.en}</div>
      <div style="font-size:10px;color:var(--bm);font-family:var(--fm)">${w.type}</div>
      <div class="bm-fc-hint">👆 برای دیدن معنی</div>`;
    document.getElementById('bm-fc-card').style.borderColor='rgba(245,158,11,.2)';
    document.getElementById('bm-fc-card').style.background='var(--bg2)';

function bmFcNav(d){
  const bm=getBm();
  const filtered=bmFilterLesson!==null?bm.filter(b=>b.lessonId===bmFilterLesson):bm;
  if(!filtered.length)return;
  bmFcIdx=(bmFcIdx+d+filtered.length)%filtered.length;
  bmFcFlipped=false;
  renderBmPanel();

function bmFcGo(i){bmFcIdx=i;bmFcFlipped=false;renderBmPanel()}

function renderBmQuiz(filtered){
  const cont=document.getElementById('bm-content');
  if(filtered.length<2){
    cont.innerHTML='<p style="color:var(--t3);text-align:center;padding:2rem">حداقل ۲ کلمه لازمه برای آزمون</p>';return;
  }
  // Build quiz from bookmarks
  const sh=[...filtered].sort(()=>Math.random()-.5);
  const qs=sh.map(w=>{
    const others=[...filtered.filter(x=>x.fa!==w.fa)].sort(()=>Math.random()-.5).slice(0,3);
    const opts=[...others.map(o=>o.fa),w.fa].sort(()=>Math.random()-.5);
    return{en:w.en,correct:w.fa,opts};
  });
  bmQst={qs,cur:0,score:0,answered:false};
  renderBmQuizCard(cont);
}

function renderBmQuizCard(cont){
  if(!cont)cont=document.getElementById('bm-content');
  const{qs,cur}=bmQst;
  if(cur>=qs.length){
    const p=Math.round(bmQst.score/qs.length*100);
    cont.innerHTML=`<div class="score" style="display:block;margin-top:.5rem">
      <div class="sc-em">${p>=80?'🎉':p>=50?'👍':'💪'}</div>
      <div class="sc-ti" style="color:var(--bm)">${p>=80?'عالی بود!':p>=50?'خوب بود!':'تلاش کن!'}</div>
      <div class="sc-nm">${bmQst.score}/${qs.length}</div>
      <div class="sc-pc">${p}٪ درست</div>
      <div class="sc-bw"><div class="sc-bf" style="width:0%;background:var(--bm);box-shadow:0 0 7px rgba(245,158,11,.4)" id="bmsc-bf"></div></div>
      <button class="rbtn" style="border-color:rgba(245,158,11,.3);background:rgba(245,158,11,.1);color:var(--bm)" onclick="setBmMode('qz')">🔄 دوباره</button>
    </div>`;
    setTimeout(()=>{const b=document.getElementById('bmsc-bf');if(b)b.style.width=p+'%'},120);
    return;
  }
  const q=qs[cur];
  cont.innerHTML=`
    <div style="font-size:12px;color:var(--t3);font-family:var(--fm);margin-bottom:.5rem">${n2fa(cur+1)} از ${n2fa(qs.length)}</div>
    <div class="qcard">
      <div class="qen">${q.en}</div>
      <div class="qopts">
        ${q.opts.map((o,i)=>`<button class="qopt" onclick="ansBmQ(${i})">${o}</button>`).join('')}
      </div>

    </div>`;

function ansBmQ(i){
  if(bmQst.answered)return;bmQst.answered=true;
  const q=bmQst.qs[bmQst.cur];
  document.querySelectorAll('#bm-content .qopt').forEach((b,j)=>{
    b.classList.add('dis');
    if(q.opts[j]===q.correct)b.classList.add('ok');
    else if(j===i&&q.opts[j]!==q.correct)b.classList.add('ng');
  });
  if(q.opts[i]===q.correct){bmQst.score++;speak(q.en)}
  document.getElementById('bmqnxt').style.display='block';
}

function nxtBmQ(){bmQst.cur++;bmQst.answered=false;renderBmQuizCard()}

function removeBmItem(key){
  let bm=getBm();
  bm=bm.filter(b=>b.key!==key);
  saveBm(bm);updBmCount();renderBmPanel();
  showToast('❌ حذف شد');
}

function clearAllBm(){
  if(!confirm('همه بوکمارک‌ها پاک بشه؟'))return;
  saveBm([]);updBmCount();
  bmFilterLesson=null;
  renderBmPanel();
  renderDots(allWords(LESSONS[curL]));
  renderWD();
}

// ── TTS ──
function speak(text,btn){
  if(!window.speechSynthesis){showToast('TTS کار نمیکنه');return}
  try{
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.lang='en-GB';u.rate=0.82;u.pitch=1;
    if(btn){
      btn.classList.add('sp');
      u.onend=()=>btn.classList.remove('sp');
      u.onerror=()=>btn.classList.remove('sp');
    }
    const trySpeak=()=>{
      const vs=window.speechSynthesis.getVoices();
      if(vs.length>0){
        const v=vs.find(x=>x.lang.startsWith('en-GB'))||vs.find(x=>x.lang.startsWith('en'))||vs[0];
        if(v)u.voice=v;
      }
      window.speechSynthesis.speak(u);
    };
    if(window.speechSynthesis.getVoices().length===0){
      window.speechSynthesis.onvoiceschanged=()=>{window.speechSynthesis.onvoiceschanged=null;trySpeak()};
      setTimeout(trySpeak,500);
    } else trySpeak();
  }catch(e){showToast('خطا در پخش صدا')}
}

// ── SWIPE ──
(()=>{
  let sx=0,sy=0;
  document.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY},{passive:true});
  document.addEventListener('touchend',e=>{
    if(!document.getElementById('tab-fc').classList.contains('on'))return;
    const dx=e.changedTouches[0].clientX-sx;
    const dy=e.changedTouches[0].clientY-sy;
    if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>50){dx<0?nextCard():prevCard()}
  },{passive:true});
})();

// ── KEYBOARD ──
document.addEventListener('keydown',e=>{
  if(document.getElementById('tab-fc').classList.contains('on')){
    if(e.key==='ArrowRight')nextCard();
    else if(e.key==='ArrowLeft')prevCard();
    else if(e.key===' '){e.preventDefault();flipCard()}
  }
});

if(document.readyState==="loading"){
  document.addEventListener("DOMContentLoaded",init);
}else{init()}
window.onload=function(){if(document.getElementById('pills').innerHTML==='')init()};
</script>
</body>
</html>
