<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>جزوه مکالمه انگلیسی</title>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0f14;
  --bg2: #13161e;
  --bg3: #1a1e28;
  --bg4: #222736;
  --green: #22c55e;
  --green2: #16a34a;
  --green3: #dcfce7;
  --green-dim: rgba(34,197,94,0.12);
  --green-glow: rgba(34,197,94,0.25);
  --accent: #38bdf8;
  --accent2: #0ea5e9;
  --accent-dim: rgba(56,189,248,0.1);
  --amber: #fbbf24;
  --amber-dim: rgba(251,191,36,0.12);
  --red: #f87171;
  --red-dim: rgba(248,113,113,0.12);
  --text: #e8eaf0;
  --text2: #9ba3b5;
  --text3: #5c6478;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --radius: 16px;
  --radius-sm: 10px;
  --radius-pill: 50px;
  --font-fa: 'Vazirmatn', sans-serif;
  --font-en: 'DM Serif Display', serif;
  --font-mono: 'DM Mono', monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { font-size: 16px; }
body {
  font-family: var(--font-fa);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ——— NOISE OVERLAY ——— */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
  opacity: 0.4;
}

/* ——— LAYOUT ——— */
.app {
  max-width: 480px;
  margin: 0 auto;
  min-height: 100vh;
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
}

/* ——— HEADER ——— */
.header {
  padding: 2rem 1.5rem 1.25rem;
  background: linear-gradient(180deg, rgba(34,197,94,0.08) 0%, transparent 100%);
  border-bottom: 1px solid var(--border);
}
.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 0.5rem;
}
.logo {
  display: flex;
  align-items: center;
  gap: 10px;
}
.logo-icon {
  width: 38px;
  height: 38px;
  border-radius: 12px;
  background: var(--green-dim);
  border: 1px solid rgba(34,197,94,0.3);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
}
.logo-text {
  font-size: 17px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.3px;
}
.logo-sub {
  font-size: 11px;
  color: var(--text3);
  font-weight: 400;
  display: block;
  margin-top: 1px;
}
.header-badge {
  font-size: 11px;
  padding: 4px 10px;
  border-radius: var(--radius-pill);
  background: var(--green-dim);
  border: 1px solid rgba(34,197,94,0.25);
  color: var(--green);
  font-family: var(--font-mono);
  font-weight: 500;
  letter-spacing: 0.3px;
}

/* ——— LESSON SELECTOR ——— */
.lesson-section {
  padding: 1rem 1.5rem;
  border-bottom: 1px solid var(--border);
}
.lesson-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--text3);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 0.75rem;
}
.lesson-pills {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  scrollbar-width: none;
  padding-bottom: 2px;
}
.lesson-pills::-webkit-scrollbar { display: none; }
.lesson-pill {
  flex-shrink: 0;
  padding: 8px 16px;
  border-radius: var(--radius-pill);
  border: 1px solid var(--border2);
  background: var(--bg2);
  font-size: 13px;
  font-weight: 600;
  color: var(--text2);
  cursor: pointer;
  transition: all 0.2s ease;
  font-family: var(--font-fa);
}
.lesson-pill:hover { border-color: rgba(34,197,94,0.4); color: var(--text); }
.lesson-pill.active {
  background: var(--green-dim);
  border-color: rgba(34,197,94,0.5);
  color: var(--green);
  box-shadow: 0 0 12px var(--green-glow);
}

/* ——— TABS ——— */
.tabs {
  display: flex;
  gap: 0;
  padding: 1rem 1.5rem 0;
  border-bottom: 1px solid var(--border);
}
.tab {
  flex: 1;
  text-align: center;
  padding: 8px 4px 12px;
  font-size: 13px;
  font-weight: 600;
  color: var(--text3);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
  letter-spacing: 0.2px;
}
.tab:hover { color: var(--text2); }
.tab.active {
  color: var(--green);
  border-bottom-color: var(--green);
}

/* ——— CONTENT AREA ——— */
.content {
  flex: 1;
  padding: 1.5rem;
  display: none;
}
.content.active { display: block; }

/* ——— LESSON TITLE ——— */
.lesson-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--accent);
  margin-bottom: 1.25rem;
  display: flex;
  align-items: center;
  gap: 8px;
}
.lesson-title::before {
  content: '';
  width: 3px;
  height: 14px;
  border-radius: 2px;
  background: var(--accent);
  flex-shrink: 0;
}

/* ——— FLASHCARD ——— */
.fc-meta {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1rem;
}
.fc-counter {
  font-size: 12px;
  color: var(--text3);
  font-family: var(--font-mono);
}
.fc-hint {
  font-size: 11px;
  color: var(--text3);
  display: flex;
  align-items: center;
  gap: 5px;
}
.fc-hint-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--text3);
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%,100% { opacity: 0.4; } 50% { opacity: 1; }
}

.card-scene {
  perspective: 1200px;
  height: 220px;
  margin-bottom: 1.25rem;
  cursor: pointer;
  position: relative;
}
.card-scene::after {
  content: '';
  position: absolute;
  bottom: -8px;
  left: 10%;
  width: 80%;
  height: 8px;
  border-radius: 50%;
  background: rgba(34,197,94,0.1);
  filter: blur(6px);
  transition: all 0.3s;
}
.card-scene:active::after { opacity: 0; }

.card-3d {
  width: 100%;
  height: 100%;
  transform-style: preserve-3d;
  transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
}
.card-scene.flipped .card-3d { transform: rotateY(180deg); }

.card-face {
  position: absolute;
  inset: 0;
  border-radius: var(--radius);
  border: 1px solid var(--border2);
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 1.5rem;
  text-align: center;
  overflow: hidden;
}

.card-front {
  background: var(--bg2);
  background: linear-gradient(135deg, var(--bg2) 0%, var(--bg3) 100%);
}
.card-front::before {
  content: '';
  position: absolute;
  top: -30px;
  right: -30px;
  width: 100px;
  height: 100px;
  border-radius: 50%;
  background: var(--green-dim);
  filter: blur(20px);
}

.card-back {
  background: linear-gradient(135deg, #0f1e16 0%, #0d1a20 100%);
  border-color: rgba(34,197,94,0.2);
  transform: rotateY(180deg);
}
.card-back::before {
  content: '';
  position: absolute;
  bottom: -20px;
  left: -20px;
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: var(--green-glow);
  filter: blur(20px);
}

.card-en {
  font-family: var(--font-en);
  font-size: 28px;
  color: var(--text);
  line-height: 1.3;
  margin-bottom: 10px;
  position: relative;
  z-index: 1;
}
.card-category {
  font-size: 11px;
  color: var(--text3);
  font-family: var(--font-mono);
  position: relative;
  z-index: 1;
}
.card-tap {
  margin-top: 16px;
  font-size: 11px;
  color: var(--text3);
  display: flex;
  align-items: center;
  gap: 6px;
  position: relative;
  z-index: 1;
}
.tap-icon { font-size: 14px; animation: bounce 1.5s infinite; }
@keyframes bounce {
  0%,100% { transform: translateY(0); } 50% { transform: translateY(-3px); }
}

.card-fa {
  font-size: 22px;
  font-weight: 700;
  color: var(--green);
  margin-bottom: 10px;
  direction: rtl;
  line-height: 1.4;
  position: relative;
  z-index: 1;
}
.card-ex {
  font-size: 12px;
  color: rgba(34,197,94,0.6);
  direction: rtl;
  position: relative;
  z-index: 1;
  line-height: 1.6;
}

/* ——— CARD CONTROLS ——— */
.card-controls {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  gap: 8px;
  margin-bottom: 1rem;
}
.ctrl-btn {
  padding: 11px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border2);
  background: var(--bg2);
  color: var(--text2);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  font-family: var(--font-fa);
  transition: all 0.18s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.ctrl-btn:hover { background: var(--bg3); color: var(--text); }
.ctrl-btn:active { transform: scale(0.96); }
.ctrl-tts {
  background: var(--green-dim);
  border-color: rgba(34,197,94,0.3);
  color: var(--green);
  padding: 11px 22px;
}
.ctrl-tts:hover { background: rgba(34,197,94,0.2); box-shadow: 0 0 12px var(--green-glow); }

/* progress dots */
.card-dots {
  display: flex;
  justify-content: center;
  gap: 5px;
  flex-wrap: wrap;
  max-width: 320px;
  margin: 0 auto;
}
.dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--bg4);
  border: 1px solid var(--border2);
  transition: all 0.2s;
}
.dot.active { background: var(--green); border-color: var(--green); box-shadow: 0 0 6px var(--green-glow); }
.dot.visited { background: var(--bg4); border-color: rgba(34,197,94,0.3); }

/* ——— WORDS LIST ——— */
.words-grid {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.word-card {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 14px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--bg2);
  transition: all 0.18s;
}
.word-card:hover { border-color: var(--border2); background: var(--bg3); }
.word-num {
  font-size: 11px;
  color: var(--text3);
  font-family: var(--font-mono);
  min-width: 20px;
  text-align: center;
}
.word-info { flex: 1; min-width: 0; }
.word-en {
  font-family: var(--font-en);
  font-size: 17px;
  color: var(--text);
  direction: ltr;
  text-align: left;
  line-height: 1.2;
  margin-bottom: 3px;
}
.word-fa {
  font-size: 12px;
  color: var(--green);
  font-weight: 500;
  direction: rtl;
}
.word-ex {
  font-size: 11px;
  color: var(--text3);
  direction: rtl;
  margin-top: 2px;
}
.word-tts {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  border: 1px solid rgba(34,197,94,0.25);
  background: var(--green-dim);
  color: var(--green);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 15px;
  flex-shrink: 0;
  transition: all 0.18s;
}
.word-tts:hover { background: rgba(34,197,94,0.2); box-shadow: 0 0 8px var(--green-glow); }
.word-tts:active { transform: scale(0.92); }
.word-tts.speaking { background: var(--green); color: #000; }

/* ——— QUIZ ——— */
.quiz-progress {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 1.25rem;
}
.quiz-prog-bar {
  flex: 1;
  height: 4px;
  background: var(--bg4);
  border-radius: 2px;
  overflow: hidden;
}
.quiz-prog-fill {
  height: 100%;
  background: var(--green);
  border-radius: 2px;
  transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
  box-shadow: 0 0 6px var(--green-glow);
}
.quiz-prog-text {
  font-size: 12px;
  color: var(--text3);
  font-family: var(--font-mono);
  min-width: 36px;
  text-align: left;
}

.quiz-card {
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  padding: 1.5rem;
  margin-bottom: 1rem;
}
.quiz-q-label {
  font-size: 11px;
  color: var(--text3);
  font-family: var(--font-mono);
  margin-bottom: 10px;
  letter-spacing: 1px;
}
.quiz-en {
  font-family: var(--font-en);
  font-size: 26px;
  color: var(--text);
  direction: ltr;
  text-align: left;
  margin-bottom: 1.25rem;
  line-height: 1.3;
}
.quiz-opts {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.quiz-opt {
  padding: 13px 16px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border2);
  background: var(--bg3);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  text-align: right;
  direction: rtl;
  color: var(--text);
  font-family: var(--font-fa);
  transition: all 0.18s;
  display: flex;
  align-items: center;
  gap: 10px;
}
.quiz-opt::after {
  content: '';
  width: 18px;
  height: 18px;
  border-radius: 50%;
  border: 1.5px solid var(--border2);
  flex-shrink: 0;
  margin-right: auto;
  transition: all 0.18s;
}
.quiz-opt:hover:not(.disabled) {
  background: var(--bg4);
  border-color: var(--border2);
}
.quiz-opt.correct {
  background: rgba(34,197,94,0.1);
  border-color: rgba(34,197,94,0.4);
  color: var(--green);
}
.quiz-opt.correct::after {
  background: var(--green);
  border-color: var(--green);
  content: '✓';
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  color: #000;
}
.quiz-opt.wrong {
  background: var(--red-dim);
  border-color: rgba(248,113,113,0.3);
  color: var(--red);
}
.quiz-opt.wrong::after {
  background: var(--red);
  border-color: var(--red);
  content: '✗';
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  color: #fff;
}
.quiz-opt.disabled { cursor: default; }

.quiz-next {
  width: 100%;
  padding: 13px;
  border-radius: var(--radius-sm);
  border: none;
  background: var(--green);
  color: #000;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  font-family: var(--font-fa);
  transition: all 0.18s;
  display: none;
  margin-top: 10px;
}
.quiz-next:hover { background: #1aad50; }
.quiz-next:active { transform: scale(0.98); }

/* ——— SCORE CARD ——— */
.score-card {
  background: linear-gradient(135deg, #0f1e16, #0a1520);
  border: 1px solid rgba(34,197,94,0.25);
  border-radius: var(--radius);
  padding: 2rem 1.5rem;
  text-align: center;
  display: none;
  animation: fadeIn 0.4s ease;
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.score-emoji { font-size: 48px; margin-bottom: 12px; }
.score-title { font-size: 22px; font-weight: 700; color: var(--green); margin-bottom: 8px; }
.score-sub { font-size: 14px; color: var(--text2); margin-bottom: 1.5rem; line-height: 1.6; }
.score-num {
  font-size: 48px;
  font-family: var(--font-mono);
  font-weight: 500;
  color: var(--text);
  margin-bottom: 4px;
}
.score-pct {
  font-size: 13px;
  color: var(--text3);
  margin-bottom: 1.5rem;
}
.score-bar-wrap {
  height: 6px;
  background: var(--bg4);
  border-radius: 3px;
  overflow: hidden;
  margin-bottom: 1.5rem;
}
.score-bar-fill {
  height: 100%;
  border-radius: 3px;
  background: var(--green);
  box-shadow: 0 0 8px var(--green-glow);
  transition: width 1s ease 0.3s;
}
.restart-btn {
  width: 100%;
  padding: 13px;
  border-radius: var(--radius-sm);
  border: 1px solid rgba(34,197,94,0.3);
  background: var(--green-dim);
  color: var(--green);
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  font-family: var(--font-fa);
  transition: all 0.18s;
}
.restart-btn:hover { background: rgba(34,197,94,0.2); }

/* ——— TOAST ——— */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: var(--radius-pill);
  padding: 10px 20px;
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  z-index: 999;
  transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  white-space: nowrap;
  pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* ——— BOTTOM SAFE AREA ——— */
.bottom-safe { height: env(safe-area-inset-bottom, 16px); }

/* ——— ANIMATIONS ——— */
@keyframes cardIn {
  from { opacity: 0; transform: translateY(10px) scale(0.98); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
.card-scene { animation: cardIn 0.35s ease; }

/* ——— iOS FIXES ——— */
input, button, select { -webkit-appearance: none; appearance: none; }
* { -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
</style>
</head>
<body>

<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div class="header-top">
      <div class="logo">
        <div class="logo-icon">📖</div>
        <div>
          <div class="logo-text">جزوه مکالمه انگلیسی</div>
          <span class="logo-sub">English Conversation · درس ۱ تا ۵</span>
        </div>
      </div>
      <div class="header-badge">v1.0</div>
    </div>
  </div>

  <!-- LESSON SELECTOR -->
  <div class="lesson-section">
    <div class="lesson-label">انتخاب درس</div>
    <div class="lesson-pills" id="lessonPills"></div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <div class="tab active" onclick="switchTab('flashcards', this)">🃏 فلش‌کارت</div>
    <div class="tab" onclick="switchTab('words', this)">📝 کلمات</div>
    <div class="tab" onclick="switchTab('quiz', this)">🎯 آزمون</div>
  </div>

  <!-- ====== FLASHCARDS ====== -->
  <div class="content active" id="tab-flashcards">
    <div class="lesson-title" id="fc-lesson-title">درس ۱: سلام و احوال‌پرسی</div>

    <div class="fc-meta">
      <span class="fc-counter" id="fc-counter">01 / 10</span>
      <div class="fc-hint"><div class="fc-hint-dot"></div> روی کارت ضربه بزن</div>
    </div>

    <div class="card-scene" id="cardScene" onclick="flipCard()">
      <div class="card-3d" id="card3d">
        <div class="card-face card-front">
          <div class="card-en" id="cf-en"></div>
          <div class="card-category" id="cf-cat"></div>
          <div class="card-tap"><span class="tap-icon">👆</span> برای دیدن معنی ضربه بزن</div>
        </div>
        <div class="card-face card-back">
          <div class="card-fa" id="cb-fa"></div>
          <div class="card-ex" id="cb-ex"></div>
        </div>
      </div>
    </div>

    <div class="card-controls">
      <button class="ctrl-btn" onclick="prevCard()"><span>◀</span> قبلی</button>
      <button class="ctrl-btn ctrl-tts" onclick="speakCurrent()">🔊 بشنو</button>
      <button class="ctrl-btn" onclick="nextCard()">بعدی <span>▶</span></button>
    </div>

    <div class="card-dots" id="cardDots"></div>
  </div>

      { en: "I'm disappointed.", fa: "ناامید شدم / دلخورم.", ex: "وقتی انتظارات برآورده نشن" },
      { en: "I'm confused.", fa: "گیج شدم / سردرگمم.", ex: "وقتی چیزی رو نمی‌فهمی" },
      { en: "I'm proud of you.", fa: "به‌ات افتخار می‌کنم.", ex: "تعریف از دیگری" },
    ]
  },
  {
    id: 5,
    title: "درس ۵: پوزش‌خواهی",
    words: [
      { en: "I'm sorry!", fa: "متاسفم! / ببخشید!", ex: "عذرخواهی کلی" },
      { en: "I owe you an apology.", fa: "باید ازت عذرخواهی کنم.", ex: "رسمی‌تر از معمول" },
      { en: "Oops! Sorry!", fa: "آخ! ببخشید!", ex: "اشتباه کوچک و ناگهانی" },
      { en: "My bad!", fa: "تقصیر منه! / اشتباه من بود!", ex: "غیررسمی، رایج" },
      { en: "I feel awful about it.", fa: "خیلی بدم میاد بابتش.", ex: "احساس گناه عمیق‌تر" },
      { en: "I'm sorry to bother you.", fa: "ببخشید که مزاحمت می‌شم.", ex: "ادبانه و محترمانه" },
      { en: "No worries!", fa: "نگران نباش! / اشکالی نداره!", ex: "پاسخ به عذرخواهی" },
      { en: "No big deal!", fa: "چیز مهمی نیست!", ex: "کم‌اهمیت کردن اشتباه" },
      { en: "It's okay, it'll come out in the wash.", fa: "اشکالی نداره، درست می‌شه.", ex: "اصطلاح؛ همه چیز درست می‌شه" },
      { en: "You don't have to apologize!", fa: "لازم نیست عذرخواهی کنی!", ex: "مهربانانه و دلجویانه" },
    ]
  }
];

// ==================== STATE ====================
let curLesson = 0;
let curCard = 0;
let isFlipped = false;
let visitedCards = new Set();
let quizState = { qs: [], cur: 0, score: 0, answered: false };
let ttsActive = null;

// ==================== INIT ====================
function init() {
  buildLessonPills();
  selectLesson(0);
}

function buildLessonPills() {
  const c = document.getElementById('lessonPills');
  c.innerHTML = LESSONS.map((l, i) =>
    `<button class="lesson-pill${i===0?' active':''}" onclick="selectLesson(${i})">درس ${farsiNum(i+1)}</button>`
  ).join('');
}

function selectLesson(idx) {
  curLesson = idx;
  curCard = 0;
  isFlipped = false;
  visitedCards = new Set([0]);
  document.querySelectorAll('.lesson-pill').forEach((b,i) => b.classList.toggle('active', i===idx));
  const L = LESSONS[idx];
  document.getElementById('fc-lesson-title').textContent = L.title;
  document.getElementById('w-lesson-title').textContent = L.title;
  document.getElementById('q-lesson-title').textContent = L.title;
  renderCard();
  renderWords();
  // re-init quiz if on quiz tab
  const qTab = document.getElementById('tab-quiz');
  if (qTab.classList.contains('active')) initQuiz();
}

// ==================== FLASHCARDS ====================
function renderCard() {
  const words = LESSONS[curLesson].words;
  const w = words[curCard];
  document.getElementById('cf-en').textContent = w.en;
  document.getElementById('cf-cat').textContent = w.ex;
  document.getElementById('cb-fa').textContent = w.fa;
  document.getElementById('cb-ex').textContent = w.ex;
  document.getElementById('fc-counter').textContent = pad(curCard+1) + ' / ' + pad(words.length);
  const scene = document.getElementById('cardScene');
  scene.classList.remove('flipped');
  isFlipped = false;
  renderDots();
}

function renderDots() {
  const words = LESSONS[curLesson].words;
  const c = document.getElementById('cardDots');
  c.innerHTML = words.map((_,i) =>
    `<div class="dot${i===curCard?' active':visitedCards.has(i)?' visited':''}"></div>`
  ).join('');
}

function flipCard() {
  isFlipped = !isFlipped;
  document.getElementById('cardScene').classList.toggle('flipped', isFlipped);
}

function prevCard() {
  const n = LESSONS[curLesson].words.length;
  curCard = (curCard - 1 + n) % n;
  visitedCards.add(curCard);
  renderCard();
}

function nextCard() {
  const n = LESSONS[curLesson].words.length;
  curCard = (curCard + 1) % n;
  visitedCards.add(curCard);
  renderCard();
}

function speakCurrent() {
  const w = LESSONS[curLesson].words[curCard];
  speakText(w.en);
}

// ==================== TTS ====================
function speakText(text, btnEl) {
  if (!window.speechSynthesis) { showToast('مرورگر از TTS پشتیبانی نمی‌کند'); return; }
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  u.rate = 0.82;
  u.pitch = 1;

  if (btnEl) {
    btnEl.classList.add('speaking');
    u.onend = () => btnEl.classList.remove('speaking');
    u.onerror = () => btnEl.classList.remove('speaking');
  }

  // iOS fix: must select a voice
  const loadVoices = () => {
    const voices = speechSynthesis.getVoices();
    const enVoice = voices.find(v => v.lang.startsWith('en')) || null;
    if (enVoice) u.voice = enVoice;
    speechSynthesis.speak(u);
  };

  if (speechSynthesis.getVoices().length === 0) {
    speechSynthesis.addEventListener('voiceschanged', loadVoices, { once: true });
    // fallback for browsers that don't fire voiceschanged
    setTimeout(() => {
      if (!speechSynthesis.speaking) loadVoices();
    }, 300);
  } else {
    loadVoices();
  }
}

// ==================== WORDS ====================
function renderWords() {
  const words = LESSONS[curLesson].words;
  document.getElementById('wordsList').innerHTML = words.map((w, i) =>
    `<div class="word-card">
      <span class="word-num">${pad(i+1)}</span>
      <div class="word-info">
        <div class="word-en">${w.en}</div>
        <div class="word-fa">${w.fa}</div>
        <div class="word-ex">${w.ex}</div>
      </div>
      <button class="word-tts" onclick="speakText('${esc(w.en)}', this)" title="بشنو">🔊</button>
    </div>`
  ).join('');
}

// ==================== QUIZ ====================
function initQuiz() {
  const words = LESSONS[curLesson].words;
  const shuffled = [...words].sort(() => Math.random() - 0.5);
  const qs = shuffled.map((w) => {
    const others = words.filter(x => x.en !== w.en).sort(() => Math.random()-0.5).slice(0, 3);
    const opts = [...others.map(o => o.fa), w.fa].sort(() => Math.random()-0.5);
    return { en: w.en, correct: w.fa, opts };
  });
  quizState = { qs, cur: 0, score: 0, answered: false };
  document.getElementById('scoreCard').style.display = 'none';
  updateQuizProgress();
  renderQuiz();
}

function renderQuiz() {
  const { qs, cur } = quizState;
  if (cur >= qs.length) { showScore(); return; }
  const q = qs[cur];
  document.getElementById('quizContainer').innerHTML = `
    <div class="quiz-card">
      <div class="quiz-q-label">سوال ${farsiNum(cur+1)} از ${farsiNum(qs.length)}</div>
      <div class="quiz-en">${q.en}</div>
      <div class="quiz-opts" id="quizOpts">
        ${q.opts.map((o,i) => `<button class="quiz-opt" onclick="answerQuiz(${i})">${o}</button>`).join('')}
      </div>
      <button class="quiz-next" id="quizNextBtn" onclick="nextQuestion()">سوال بعدی ▶</button>
    </div>`;
}

function answerQuiz(idx) {
  if (quizState.answered) return;
  quizState.answered = true;
  const q = quizState.qs[quizState.cur];
  const opts = document.querySelectorAll('.quiz-opt');
  opts.forEach((btn, i) => {
    btn.classList.add('disabled');
    if (q.opts[i] === q.correct) btn.classList.add('correct');
    else if (i === idx && q.opts[i] !== q.correct) btn.classList.add('wrong');
  });
  if (q.opts[idx] === q.correct) {
    quizState.score++;
    speakText(q.en);
  }
  document.getElementById('quizNextBtn').style.display = 'block';
}

function nextQuestion() {
  quizState.cur++;
  quizState.answered = false;
  updateQuizProgress();
  renderQuiz();
}

function updateQuizProgress() {
  const { qs, cur } = quizState;
  const pct = qs.length ? (cur / qs.length * 100) : 0;
  document.getElementById('quizFill').style.width = pct + '%';
  document.getElementById('quizProgText').textContent = cur + ' / ' + qs.length;
}

function showScore() {
  const { score, qs } = quizState;
  const pct = Math.round(score / qs.length * 100);
  const sc = document.getElementById('scoreCard');
  sc.style.display = 'block';
  document.getElementById('quizContainer').innerHTML = '';
  document.getElementById('scoreEmoji').textContent = pct >= 80 ? '🎉' : pct >= 50 ? '👍' : '💪';
  document.getElementById('scoreTitle').textContent = pct >= 80 ? 'عالی بود!' : pct >= 50 ? 'خوب بود!' : 'تمرین بیشتر!';
  document.getElementById('scoreNum').textContent = score + ' / ' + qs.length;
  document.getElementById('scorePct').textContent = pct + '٪ درست';
  document.getElementById('scoreSub').textContent = pct >= 80 ? 'کاملاً مسلط هستی به این درس 💚' : pct >= 50 ? 'نزدیک‌ات! یه بار دیگه امتحان کن.' : 'فلش‌کارت‌ها رو مرور کن و دوباره بیا.';
  setTimeout(() => {
    document.getElementById('scoreBarFill').style.width = pct + '%';
  }, 100);
}

function restartQuiz() {
  document.getElementById('scoreCard').style.display = 'none';
  initQuiz();
}

// ==================== TABS ====================
function switchTab(name, el) {
  ['flashcards','words','quiz'].forEach(t => {
    const tab = document.getElementById('tab-' + t);
    tab.classList.toggle('active', t === name);
  });
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  if (name === 'quiz') initQuiz();
}

// ==================== HELPERS ====================
function pad(n) { return n < 10 ? '0' + n : '' + n; }
function esc(s) { return s.replace(/'/g, "\\'").replace(/"/g, '&quot;'); }
function farsiNum(n) {
  const map = ['۰','۱','۲','۳','۴','۵','۶','۷','۸','۹'];
  return String(n).replace(/[0-9]/g, d => map[d]);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ==================== SWIPE SUPPORT ====================
(function() {
  let startX = 0, startY = 0;
  document.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
  }, { passive: true });
  document.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - startX;
    const dy = e.changedTouches[0].clientY - startY;
    const fc = document.getElementById('tab-flashcards');
    if (!fc.classList.contains('active')) return;
    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) {
      if (dx < 0) nextCard(); else prevCard();
    }
  }, { passive: true });
})();

// ==================== KEYBOARD ——— 
document.addEventListener('keydown', e => {
  const fc = document.getElementById('tab-flashcards');
  if (!fc.classList.contains('active')) return;
  if (e.key === 'ArrowRight') nextCard();
  else if (e.key === 'ArrowLeft') prevCard();
  else if (e.key === ' ') { e.preventDefault(); flipCard(); }
});

// ==================== START ====================
init();
</script>
